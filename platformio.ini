; PlatformIO configuration for ESP32 Chlorinator BLE/MQTT Gateway
;
; Board:  ESP32-PICO-DevKitM  (ESP32-PICO-MINI-02, dual-core Xtensa, WiFi + BLE 4.2)
; Target: Astral Pool Viron eQuilibrium chlorinator
;
; Flash:   pio run -t upload
; Monitor: pio device monitor

[env:esp32-pico-devkitm]
platform    = espressif32
board       = esp32-pico-devkitm-2
framework   = arduino

monitor_speed  = 115200
upload_speed   = 921600

; NimBLE uses less RAM than BlueDroid and coexists better with WiFi
extra_scripts = pre:load_env.py

lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Increase log verbosity during development, set to 0 for production
