; PlatformIO configuration for ESP32 Chlorinator BLE/MQTT Gateway
;
; Board:  ESP32-PICO-DevKitM  (ESP32-PICO-MINI-02, dual-core Xtensa, WiFi + BLE 4.2)
; Target: Astral Pool Viron eQuilibrium chlorinator
;
; USB  (default): pio run -t upload  |  pio device monitor
; WiFi:           pio run -e wifi -t upload  |  pio device monitor -e wifi

[platformio]
default_envs = usb

[env]
; ── shared by all environments ───────────────────────────────────────────────
platform      = espressif32
board         = esp32-pico-devkitm-2
framework     = arduino
extra_scripts = pre:load_env.py
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Increase log verbosity during development, set to 0 for production

[env:usb]
upload_speed  = 921600
monitor_speed = 115200

[env:wifi]
; OTA + log share a single TCP port (port 80) for deployment through a
; restrictive gateway. pio device monitor connects as a raw TCP log stream.
; pio run -t upload runs tools/ota_upload.py to push firmware over the same port.
upload_port     = 10.1.1.243:80
upload_protocol = custom
upload_command  = python tools/ota_upload.py $UPLOAD_PORT $SOURCE
monitor_port    = socket://${this.upload_port}
